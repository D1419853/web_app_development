{% extends "base.html" %}

{% block title %}捐獻香油錢 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold fortune-title">功德迴向，福報滿滿</h1>
            <p class="text-secondary">您的每一分支持，都是維持系統運作、傳遞正能量的重要動力。</p>
        </div>
        
        <div class="card p-4 shadow-lg">
            <h3 class="h4 mb-4 text-center">捐獻香油錢</h3>
            <form action="{{ url_for('main.donate') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label">選擇捐獻金額</label>
                    <div class="row g-2">
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="amount" id="amt1" value="100" checked>
                            <label class="btn btn-outline-warning w-100" for="amt1">$100</label>
                        </div>
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="amount" id="amt2" value="500">
                            <label class="btn btn-outline-warning w-100" for="amt2">$500</label>
                        </div>
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="amount" id="amt3" value="1000">
                            <label class="btn btn-outline-warning w-100" for="amt3">$1,000</label>
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="custom_amount" class="form-label">自訂金額</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark text-light border-secondary">$</span>
                        <input type="number" class="form-control" name="custom_amount" id="custom_amount" placeholder="輸入其他金額">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="message" class="form-label">祈福留言 (選填)</label>
                    <textarea class="form-control" id="message" name="message" rows="3" placeholder="寫下您的心願或悄悄話..."></textarea>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">確認捐獻</button>
                </div>
            </form>
            
            <div class="mt-4 text-center">
                <p class="small text-secondary mb-0">目前支援：虛擬轉帳、模擬支付</p>
            </div>
        </div>
        
        <div class="mt-5 card p-4 border-warning">
            <h5 class="text-warning mb-3">為什麼要捐獻？</h5>
            <ul class="text-secondary small">
                <li>支持系統維護與雲端主機支出。</li>
                <li>幫助我們開發更多如塔羅、占星等預測模組。</li>
                <li>為自己與家人祈求一份好運。</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // JS 邏輯：如果輸入自訂金額，取消 Radio 選取
    document.getElementById('custom_amount').addEventListener('input', function() {
        if(this.value > 0) {
            document.querySelectorAll('input[name="amount"]').forEach(el => el.checked = false);
        }
    });
</script>
{% endblock %}
