{% extends "base.html" %}

{% block title %}會員登入 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center mb-4">會員登入</h2>
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">帳號名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">登入</button>
                </div>
                <p class="text-center text-secondary">
                    還沒有帳號？ <a href="{{ url_for('auth.register') }}" class="text-warning">立即註冊</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
