{% extends "base.html" %}

{% block title %}會員註冊 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center mb-4">加入會員</h2>
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">帳號名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">設定密碼 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">註冊帳號</button>
                </div>
                <p class="text-center text-secondary">
                    已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-warning">登入</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
